<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aashi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

/* PAGES */

.page{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
overflow:hidden;
}

.page.active{
display:flex;
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:scale(1.05);
}
to{
opacity:1;
transform:scale(1);
}
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at top,#ff008044,transparent 35%),
radial-gradient(circle at bottom,#7c3aed44,transparent 35%),
#050505;
z-index:-3;
}

.noise{
position:absolute;
inset:0;
background-image:
radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
background-size:40px 40px;
opacity:.1;
z-index:-2;
}

/* CARD */

.card{
width:min(92%,520px);
padding:40px;
border-radius:35px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 40px rgba(255,0,128,.12),
0 0 100px rgba(124,58,237,.1);
text-align:center;
}

/* TEXT */

.title{
font-family:'Cinzel',serif;
font-size:3rem;
line-height:1.3;
letter-spacing:2px;
text-shadow:
0 0 20px rgba(255,105,180,.6);
}

.sub{
margin-top:20px;
line-height:1.9;
opacity:.85;
}

/* BUTTON */

.btn{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff0080,#7c3aed);
color:white;
font-size:1rem;
cursor:pointer;
transition:.4s;
box-shadow:
0 0 20px rgba(255,0,128,.3);
}

.btn:hover{
transform:scale(1.05);
}

/* INPUT */

input{
width:100%;
padding:16px;
margin-top:20px;
border:none;
outline:none;
border-radius:20px;
background:rgba(255,255,255,.08);
color:white;
font-size:1rem;
}

/* TIMER */

#countdown{
font-size:2.2rem;
margin-top:25px;
font-weight:700;
color:#ffd6ef;
}

/* VIDEO */

video{
width:960px;
height:720px;

max-width:92%;
max-height:82vh;

object-fit:contain;
background:black;

border-radius:28px;

border:2px solid rgba(255,255,255,.08);

box-shadow:
0 0 25px rgba(255,0,128,.25),
0 0 60px rgba(124,58,237,.18);

animation:floatVideo 4s ease-in-out infinite;
}

@keyframes floatVideo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:.4;
}

50%{
transform:scale(1.15);
opacity:.7;
}

100%{
transform:scale(1);
opacity:.4;
}

}

/* FINAL PAGE */

.final-title{
font-family:'Cinzel',serif;
font-size:3rem;
line-height:1.5;
text-shadow:
0 0 20px rgba(255,105,180,.6);
}

.final-sub{
margin-top:20px;
opacity:.8;
line-height:1.8;
}

/* FLOATING LIGHTS */

.light{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:#ff4fa3;
box-shadow:0 0 15px #ff4fa3;
opacity:.5;
animation:float 10s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120vh);
}
}

/* HINT */

.hint{
position:fixed;
top:20px;
right:20px;
padding:10px 16px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
font-size:.85rem;
box-shadow:0 0 15px rgba(255,0,128,.25);
z-index:999;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:2rem;
}

.final-title{
font-size:2rem;
}

#countdown{
font-size:1.5rem;
}

video{
width:92%;
height:auto;
max-height:72vh;
}

}

</style>
</head>

<body>

<div class="hint">
🎬 Wear earphones for best experience
</div>

<!-- TIMER PAGE -->

<section class="page active" id="timerPage">

<div class="bg"></div>
<div class="noise"></div>

<div class="card">

<h1 class="title">
THE NIGHT<br>UNLOCKS ❤️
</h1>

<p class="sub">
At midnight...  
something made only for Aashi will appear ✨
</p>

<div id="countdown">
00 : 00 : 00
</div>

<button class="btn"
id="enterBtn"
style="display:none;"
onclick="openPassword()">

Enter The Secret ✨

</button>

</div>

</section>

<!-- PASSWORD PAGE -->

<section class="page" id="passwordPage">

<div class="bg"></div>
<div class="noise"></div>

<div class="card">

<h1 class="title">
ONE LAST STEP ❤️
</h1>

<p class="sub">
Only one person knows this password...
</p>

<input
type="password"
id="pass"
placeholder="Enter Password">

<button class="btn" onclick="checkPass()">
Unlock 🎬
</button>

<p id="wrong" style="margin-top:15px;"></p>

</div>

</section>

<!-- VIDEO PAGE -->

<section class="page" id="videoPage">

<div class="bg"></div>
<div class="noise"></div>

<div style="
position:absolute;
width:450px;
height:450px;
border-radius:50%;
background:radial-gradient(circle,#ff008055,transparent 70%);
filter:blur(90px);
animation:pulse 5s infinite;
"></div>

<video
id="mainVideo"
controls>

<source src="aashi.mp4" type="video/mp4">

</video>

</section>

<!-- FINAL PAGE -->

<section class="page" id="finalPage">

<div class="bg"></div>
<div class="noise"></div>

<div class="card">

<h1 class="final-title">
More Things<br>Are Waiting ❤️
</h1>

<p class="final-sub">
This wasn’t the surprise...  
this was only the beginning ✨
</p>

<button class="btn"
onclick="location.reload()">

Replay Again ❤️

</button>

</div>

</section>

<script>

/* PAGE SWITCH */

function showPage(id){

document.querySelectorAll('.page')
.forEach(page=>{
page.classList.remove('active');
});

document.getElementById(id)
.classList.add('active');

}

/* COUNTDOWN */

const targetDate =
new Date("May 28, 2026 00:00:00").getTime();

const countdown =
setInterval(()=>{

const now = new Date().getTime();

const distance = targetDate - now;

const h = Math.floor(
(distance%(1000*60*60*24))
/(1000*60*60)
);

const m = Math.floor(
(distance%(1000*60*60))
/(1000*60)
);

const s = Math.floor(
(distance%(1000*60))
/1000
);

document.getElementById("countdown")
.innerHTML =
`${h}h : ${m}m : ${s}s`;

if(distance<=0){

clearInterval(countdown);

document.getElementById("countdown")
.innerHTML =
"✨ It's Time ✨";

document.getElementById("enterBtn")
.style.display = "inline-block";

}

},1000);

/* PASSWORD */

function openPassword(){

showPage('passwordPage');

}

function checkPass(){

const pass =
document.getElementById('pass').value;

if(pass === "1028"){

showPage('videoPage');

const video =
document.getElementById('mainVideo');

video.play();

}else{

document.getElementById('wrong')
.innerHTML =
"Wrong Password 😭";

}

}

/* VIDEO END */

const video =
document.getElementById('mainVideo');

video.onended = ()=>{

showPage('finalPage');

};

/* FLOATING LIGHTS */

function createLights(){

setInterval(()=>{

const light =
document.createElement('div');

light.classList.add('light');

light.style.left =
Math.random()*100 + 'vw';

light.style.animationDuration =
(Math.random()*8+5)+'s';

document.body.appendChild(light);

setTimeout(()=>{
light.remove();
},12000);

},500);

}

createLights();

</script>

</body>
</html>
